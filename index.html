<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07090f;--surface:#0d1117;--surface2:#111820;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.04);--text:#e8edf2;--muted:#4a5568;--muted2:#2d3748;--green:#34d399;--blue:#5b9cf6;--amber:#fbbf24;--red:#f87171;--orange:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-size:13px;min-height:100vh;}
.wrapper{max-width:1600px;margin:0 auto;padding:28px 24px;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border2);}
.header-left .eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.header-left h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#f0f4f8;line-height:1;}
.header-left .subtitle{font-size:11px;color:var(--muted);margin-top:5px;}
.header-right{display:flex;gap:8px;align-items:center;}

/* BUTTONS */
.btn{font-family:'Epilogue',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.05em;padding:7px 14px;border-radius:7px;cursor:pointer;border:1px solid;transition:all 0.18s;}
.btn-primary{background:rgba(91,156,246,0.12);border-color:rgba(91,156,246,0.3);color:var(--blue);}
.btn-primary:hover{background:rgba(91,156,246,0.22);}
.btn-green{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.3);color:var(--green);}
.btn-green:hover{background:rgba(52,211,153,0.22);}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:rgba(255,255,255,0.15);color:var(--text);}
.btn-danger{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2);color:var(--red);font-size:10px;padding:4px 9px;}
.btn-danger:hover{background:rgba(248,113,113,0.16);}
.btn-amber{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:var(--amber);}
.btn-sm{padding:4px 10px;font-size:10px;}

/* SUMMARY */
.summary-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;}
.stat-card .val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px;}
.stat-card .lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.stat-card .sub{font-size:10px;color:var(--muted2);margin-top:2px;}

/* TABS & VIEW TOGGLE */
.top-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.tabs-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.tab{font-size:11px;font-weight:700;padding:6px 13px;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Epilogue',sans-serif;transition:all 0.18s;white-space:nowrap;}
.tab:hover{border-color:rgba(255,255,255,0.14);color:var(--text);}
.tab.active{background:rgba(91,156,246,0.1);border-color:rgba(91,156,246,0.35);color:var(--blue);}
.tab-add{font-size:17px;line-height:1;padding:3px 12px;border-radius:7px;cursor:pointer;border:1px dashed rgba(52,211,153,0.35);background:transparent;color:var(--green);font-family:'Epilogue',sans-serif;transition:all 0.18s;}
.tab-add:hover{background:rgba(52,211,153,0.08);}
.view-toggle{display:flex;gap:6px;}
.view-btn{font-size:10px;font-weight:700;letter-spacing:0.06em;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Epilogue',sans-serif;transition:all 0.18s;}
.view-btn.active{background:rgba(91,156,246,0.1);border-color:rgba(91,156,246,0.3);color:var(--blue);}

/* PROJECT GRID */
.project-grid{display:grid;gap:18px;}
.project-grid.cols-1{grid-template-columns:1fr;max-width:720px;}
.project-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.project-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.project-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.project-panel{display:flex;flex-direction:column;gap:12px;animation:fadeInUp 0.22s ease both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* PANEL HEADER */
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#f0f4f8;line-height:1.1;}
.panel-type{font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-top:3px;text-transform:uppercase;}
.panel-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.units-badge .num{font-size:22px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;text-align:right;}
.units-badge .lbl{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.card-label{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}

/* BUDGET */
.budget-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.bar-track{background:rgba(255,255,255,0.05);border-radius:4px;height:8px;overflow:hidden;display:flex;}
.bar-spent{height:100%;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
.bar-committed{height:100%;background:rgba(251,191,36,0.45);transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
.bar-remaining{height:100%;background:rgba(255,255,255,0.04);flex:1;}
.budget-legend{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}
.budget-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);}
.budget-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.budget-sub{display:flex;gap:0;margin-top:10px;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.budget-sub-item{flex:1;padding:8px 10px;border-right:1px solid var(--border2);}
.budget-sub-item:last-child{border-right:none;}
.budget-sub-item .val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.budget-sub-item .lbl{font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:0.04em;}

/* MILESTONES */
.milestone-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2);}
.milestone-row:last-child{border-bottom:none;}
.milestone-left{flex:1;min-width:0;}
.milestone-name{font-size:12px;line-height:1.3;}
.milestone-name.done{text-decoration:line-through;color:var(--muted);}
.milestone-dates{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center;}
.milestone-dates .arrow{color:var(--muted2);}
.milestone-dates .end-date.shifted{color:var(--orange);font-weight:700;}
.milestone-dep-info{font-size:10px;color:var(--muted);margin-top:2px;}
.milestone-dep-info.cascading{color:var(--orange);}
.milestone-right{display:flex;gap:6px;align-items:flex-start;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;padding-top:1px;}
.milestone-date{font-size:10px;color:var(--muted);}
.milestone-date.shifted{color:var(--orange);font-weight:700;}
.pill{font-size:9px;font-weight:800;letter-spacing:0.06em;padding:2px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.pill-done{background:rgba(52,211,153,0.12);color:var(--green);}
.pill-in-progress{background:rgba(91,156,246,0.12);color:var(--blue);}
.pill-at-risk{background:rgba(251,146,60,0.14);color:var(--orange);}
.pill-upcoming{background:rgba(74,85,104,0.2);color:var(--muted);}
.pill-cascade{background:rgba(248,113,113,0.15);color:var(--red);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.cascade-badge{font-size:9px;font-weight:800;color:var(--red);background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);padding:1px 6px;border-radius:4px;white-space:nowrap;}

/* ISSUES */
.issue-item{border-radius:7px;padding:8px 11px;margin-bottom:6px;}
.issue-item:last-child{margin-bottom:0;}
.issue-high{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.18);}
.issue-medium{background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.16);}
.issue-low{background:rgba(74,85,104,0.12);border:1px solid var(--border2);}
.issue-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.issue-dot-high{background:var(--red);}
.issue-dot-medium{background:var(--amber);}
.issue-dot-low{background:var(--muted);}
.issue-text{font-size:12px;color:#cbd5e1;line-height:1.4;}
.issue-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.issue-linked-ms{font-size:9px;color:var(--blue);background:rgba(91,156,246,0.1);border:1px solid rgba(91,156,246,0.2);padding:1px 7px;border-radius:4px;white-space:nowrap;}
.empty-state{font-size:12px;color:var(--muted);font-style:italic;padding:3px 0;}

/* ── GANTT ─────────────────────────────────────────────────────── */
.gantt-wrapper{background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:18px;}
.gantt-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border2);}
.gantt-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#f0f4f8;}
.gantt-scroll{overflow-x:auto;}
.gantt-table{width:100%;border-collapse:collapse;min-width:900px;}
.gantt-table th{font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:8px 10px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border2);white-space:nowrap;}
.gantt-table th.month-header{text-align:center;border-left:1px solid var(--border2);font-size:9px;padding:6px 4px;}
.gantt-table td{padding:5px 8px;border-bottom:1px solid var(--border2);vertical-align:middle;}
.gantt-table tr:last-child td{border-bottom:none;}
.gantt-table tr:hover td{background:rgba(255,255,255,0.02);}
.g-name{font-size:12px;color:var(--text);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
.g-name.done{color:var(--muted);text-decoration:line-through;}
.g-project{font-size:9px;color:var(--muted);margin-top:1px;}
.g-date{font-size:10px;color:var(--muted);white-space:nowrap;text-align:center;}
.g-date.shifted{color:var(--orange);font-weight:700;}
.g-status{text-align:center;}
.g-cascade{font-size:10px;color:var(--red);font-weight:700;white-space:nowrap;text-align:center;}
.gantt-cell{position:relative;height:28px;}
.gantt-bar{position:absolute;height:14px;top:7px;border-radius:3px;min-width:6px;transition:all 0.3s;}
.gantt-bar-done{background:rgba(52,211,153,0.4);border:1px solid rgba(52,211,153,0.6);}
.gantt-bar-progress{background:rgba(91,156,246,0.4);border:1px solid rgba(91,156,246,0.6);}
.gantt-bar-risk{background:rgba(251,146,60,0.4);border:1px solid rgba(251,146,60,0.6);}
.gantt-bar-upcoming{background:rgba(74,85,104,0.3);border:1px solid rgba(74,85,104,0.5);}
.gantt-bar-cascade{background:rgba(248,113,113,0.35);border:1px solid rgba(248,113,113,0.6);animation:pulse 2s infinite;}
.gantt-today{position:absolute;top:0;bottom:0;width:1px;background:rgba(251,191,36,0.5);pointer-events:none;}
.dep-arrow{font-size:9px;color:var(--muted);}
.dep-arrow.broken{color:var(--orange);}

/* IMPORT PANEL */
.import-panel{background:var(--surface);border:1px solid rgba(91,156,246,0.2);border-radius:10px;padding:16px 18px;margin-bottom:20px;}
.import-hint{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.import-hint span{color:var(--blue);}
textarea{width:100%;height:80px;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:7px;padding:9px;color:var(--text);font-size:11px;font-family:'Courier New',monospace;resize:vertical;outline:none;}
textarea:focus{border-color:rgba(91,156,246,0.4);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#0d1117;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:26px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:21px;color:#f0f4f8;margin-bottom:18px;}
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field-group input,.field-group select{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:12px;outline:none;}
.field-group input:focus,.field-group select:focus{border-color:rgba(91,156,246,0.4);}
.modal-section{font-size:9px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--border2);}
.modal-row{display:flex;gap:10px;}
.modal-row .field-group{flex:1;}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;align-items:center;}
.modal-actions-left{margin-right:auto;}
.edit-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;flex-wrap:nowrap;}
.edit-row input{flex:1;min-width:0;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:11px;outline:none;}
.edit-row input:focus{border-color:rgba(91,156,246,0.4);}
.edit-row input.w-date{width:106px;flex:none;}
.edit-row input.w-dur{width:60px;flex:none;}
.edit-row select{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:6px 7px;color:var(--text);font-family:'Epilogue',sans-serif;font-size:11px;outline:none;flex:none;}
.edit-row select.w-status{width:118px;}
.edit-row select.w-dep{width:180px;}
.edit-row select.w-ms{width:220px;}
.edit-row select.w-pri{width:82px;}
.add-row-btn{font-size:11px;color:var(--blue);background:none;border:1px dashed rgba(91,156,246,0.28);border-radius:6px;padding:5px 12px;cursor:pointer;width:100%;margin-top:3px;font-family:'Epilogue',sans-serif;}
.add-row-btn:hover{background:rgba(91,156,246,0.06);}
.delete-confirm{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.18);border-radius:7px;padding:11px 13px;margin-bottom:4px;font-size:12px;color:#fca5a5;line-height:1.5;}
.checkbox-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--text);}
.checkbox-label input[type=checkbox]{width:auto;accent-color:#5b9cf6;}
.dep-label{font-size:9px;color:var(--muted);background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;white-space:nowrap;}

/* FOOTER */
.footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);letter-spacing:0.06em;}
@media print{.header-right,.top-controls,.import-panel,.modal-overlay,.btn{display:none!important;}body{background:white;color:black;}.card,.gantt-wrapper{border:1px solid #e2e8f0;background:white;}}
</style>
</head>
<body>
<div class="wrapper">

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Private Equity · Portfolio Operations</div>
    <h1>Project Command Center</h1>
    <div class="subtitle" id="weekLabel"></div>
  </div>
  <div class="header-right">
    <span id="connStatus" style="font-size:10px;letter-spacing:0.04em;padding:5px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#4a5568;margin-right:6px;vertical-align:middle"></span>
      <span style="color:#4a5568">Not connected to Google Sheets</span>
    </span>
    <button class="btn btn-green" onclick="fetchFromSheets()" title="Sync now from Google Sheets">⟳ Sync</button>
    <button class="btn btn-primary" onclick="toggleImport()">↑ Import Excel</button>
    <button class="btn btn-ghost" onclick="window.print()">⎙ Print</button>
  </div>
</div>

<div class="import-panel" id="importPanel" style="display:none">
  <div style="font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Import Excel — Budget Updates</div>
  <div class="import-hint">Columns: <span>Project Name | Budget | Spent</span> — paste with header row</div>
  <textarea id="importText" placeholder="Project&#9;Budget&#9;Spent&#10;Your Project&#9;10000000&#9;4500000"></textarea>
  <div style="font-size:11px;color:var(--red);margin-top:5px;" id="importError"></div>
  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn btn-green" onclick="applyImport()">Apply</button>
    <button class="btn btn-ghost" onclick="toggleImport()">Cancel</button>
  </div>
</div>

<div class="summary-strip" id="summaryStrip"></div>

<div class="top-controls">
  <div class="tabs-bar" id="tabBar"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="vbCards" onclick="setView('cards')">CARDS</button>
    <button class="view-btn" id="vbGantt" onclick="setView('gantt')">GANTT</button>
  </div>
</div>

<div id="mainContent"></div>

<div class="footer">
  <span>CONFIDENTIAL — INTERNAL USE ONLY</span>
  <span id="footerLabel"></span>
</div>
</div>

<div class="modal-overlay" id="editModal" style="display:none" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ─── GOOGLE SHEETS CONFIG ────────────────────────────────────────────────────
// Paste your Apps Script Web App URL here after setup (see instructions below)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBNumVVSU7RchvJ5TWsdZRBRsCmvF_i6hlAVt_gn1_Ra35DE5KApXnPpYPoYSjaduj/exec';

const SHEET_TABS = [
  { name: 'Crossroads',   gid: '1803246924' },
  { name: 'May River',    gid: '1006647050' },
  { name: 'M6/7',         gid: '1446986091' },
  { name: 'Anson Road',   gid: '456077628'  },
  { name: 'Cottage',      gid: '660182814'  },
  { name: 'AZB',          gid: '655184058'  },
  { name: 'CIG Phase 9B', gid: '440477916'  },
  { name: 'CIG Phase 9C', gid: '844081161'  },
  { name: 'MP Village',   gid: '325259578'  },
];

const REFRESH_INTERVAL_MS = 120000;
let _refreshTimer = null;
let _lastFetch = null;

// ─── STATE ────────────────────────────────────────────────────────────────────
let projects = [];
let activeProject = null;
let currentView = 'cards';
let _uid = 1, _mc = 0, _ic = 0;

function newId() { return 'p' + (_uid++); }
function newMid() { return 'm' + (Date.now()) + '_' + (_mc++); }

// ─── FETCH VIA APPS SCRIPT ────────────────────────────────────────────────────
async function fetchFromSheets() {
  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    setConnectionStatus('error', 'Paste your Apps Script URL — see setup banner');
    showSetupBanner();
    return;
  }
  setConnectionStatus('syncing');
  try {
    const resp = await fetch(APPS_SCRIPT_URL, { signal: AbortSignal.timeout(30000) });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data || !Array.isArray(data.tabs)) throw new Error('Bad response from Apps Script');

    const newProjects = [];
    for (const tab of data.tabs) {
      const p = parseProjectCSV(tab.csv, tab.name);
      if (p) {
        console.log('✓', tab.name, 'budget:', p.budget, 'milestones:', p.milestones.length, 'issues:', p.issues.length);
        newProjects.push(p);
      }
    }

    if (newProjects.length > 0) {
      newProjects.forEach(sheetP => {
        const existing = projects.find(p => p.name === sheetP.name);
        if (existing) { Object.assign(existing, { ...sheetP, id: existing.id }); }
        else { projects.push({ ...sheetP, id: newId() }); }
      });
      projects = projects.filter(p => newProjects.some(sp => sp.name === p.name));
      _lastFetch = new Date();
      setConnectionStatus('connected');
      render();
    } else {
      throw new Error('No project data parsed');
    }
  } catch(e) {
    console.error('Fetch error:', e);
    setConnectionStatus('error', e.message);
  }
}

function parseProjectCSV(csvText, tabName) {
  // Robust CSV row parser — handles quoted fields containing commas
  function parseCSVRow(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result.map(c => c.replace(/^"|"$/g, '').trim());
  }

  const lines = csvText.split('\n').filter(l => l.trim());
  const rows = lines.map(parseCSVRow);
  if (!rows.length) return null;

  const p = {
    id: newId(), name: tabName, type: '', budget: 0, spent: 0, committed: 0,
    hasUnits: false, unitsPlanned: 0, unitsClosed: 0, unitsInProgress: 0,
    milestones: [], issues: []
  };

  // Your sheet layout: col A = label OR data, col B onward = value OR more data
  // Sections are detected by col A content; within info/budget, the value
  // is either in col B of the SAME row, or col A of the NEXT row (vertical stacking).
  // Milestone and issue rows are fully horizontal: name, startDate, endDate, status...

  let section = '';
  // For vertical label→value pairs, track what label we just saw
  let pendingLabel = '';

  const SKIP = new Set([
    'FIELD','VALUE','NOTES','MILESTONE NAME','START DATE','END DATE',
    'STATUS','SLIP DAYS','PREDECESSOR MILESTONE',
    'ISSUE DESCRIPTION','OWNER','PRIORITY','LINKED MILESTONE','DATE IDENTIFIED',
    'STATUS / RESOLUTION','PRIORITY','DESCRIPTION','TARGET DATE'
  ]);

  function cleanNum(s) { return parseFloat((s||'0').replace(/[$,\s]/g,''))||0; }
  function cleanStr(s) { return (s||'').trim(); }

  function applyInfoValue(label, value) {
    const L = label.toUpperCase();
    if (L.includes('PROJECT NAME') && value) p.name = value;
    if (L.includes('PROJECT TYPE') && value) p.type = value;
  }

  function applyBudgetValue(label, value) {
    const L = label.toUpperCase();
    const n = cleanNum(value);
    if (L.includes('APPROVED BUDGET') || L.includes('TOTAL APPROVED')) p.budget = n;
    if (L.includes('SPENT TO DATE') || L.includes('TOTAL SPENT')) p.spent = n;
    if (L.includes('COMMITTED')) p.committed = n;
    if (L.includes('TRACK HOMEBUILDING') && value.toLowerCase() === 'yes') p.hasUnits = true;
    if (L.includes('UNITS PLANNED')) p.unitsPlanned = parseInt(value)||0;
    if (L.includes('UNITS CLOSED')) p.unitsClosed = parseInt(value)||0;
    if (L.includes('UNITS IN PROGRESS')) p.unitsInProgress = parseInt(value)||0;
  }

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const a = row[0] || '';  // col A
    const b = row[1] || '';  // col B
    const AU = a.toUpperCase();

    // ── Section headers ──────────────────────────────────────────────────────
    if (AU.includes('PROJECT INFORMATION'))               { section='info';       pendingLabel=''; continue; }
    if (AU.includes('BUDGET & COST') || AU==='BUDGET')    { section='budget';     pendingLabel=''; continue; }
    if (AU.includes('MILESTONE SCHEDULE'))                { section='milestones'; pendingLabel=''; continue; }
    if (AU.includes('OPEN ISSUES') || AU.includes('ISSUES & BLOCKERS')) { section='issues'; pendingLabel=''; continue; }
    if (AU.includes('NEXT WEEK'))                         { section='';           pendingLabel=''; continue; }

    // ── Skip noise rows ───────────────────────────────────────────────────────
    if (!a) { pendingLabel=''; continue; }
    if (a.includes('↑') || a.includes('Add more rows')) continue;
    if (a.includes('Fill in all blue')) continue;
    if (a.includes('Last Updated')) continue;
    if (SKIP.has(AU)) { pendingLabel=''; continue; }

    // ── INFO section ──────────────────────────────────────────────────────────
    if (section === 'info') {
      if (b) {
        // Label and value on same row (col A = label, col B = value)
        applyInfoValue(a, b);
        pendingLabel = '';
      } else {
        // Label only on this row — value might be on next row col A, or blank
        // Check if it looks like a label (known field names)
        const AU2 = AU;
        if (AU2.includes('PROJECT NAME') || AU2.includes('PROJECT TYPE') ||
            AU2.includes('REPORT OWNER') || AU2.includes('WEEK ENDING')) {
          pendingLabel = a;
        } else if (pendingLabel) {
          // This row's col A IS the value for the previous label
          applyInfoValue(pendingLabel, a);
          pendingLabel = '';
        }
      }
      continue;
    }

    // ── BUDGET section ────────────────────────────────────────────────────────
    if (section === 'budget') {
      // Check for inline unit cols on same row as "Track Homebuilding"
      if (AU.includes('TRACK HOMEBUILDING')) {
        if (b.toLowerCase() === 'yes') p.hasUnits = true;
        // Scan remaining cols for Units Planned / Closed / In Progress
        for (let ci = 2; ci < row.length - 1; ci++) {
          const lbl = (row[ci]||'').toUpperCase();
          const val = row[ci+1]||'';
          if (lbl.includes('PLANNED'))  p.unitsPlanned    = parseInt(val)||0;
          if (lbl.includes('CLOSED'))   p.unitsClosed     = parseInt(val)||0;
          if (lbl.includes('PROGRESS')) p.unitsInProgress = parseInt(val)||0;
        }
        pendingLabel = '';
        continue;
      }
      if (b) {
        applyBudgetValue(a, b);
        pendingLabel = '';
      } else {
        const knownBudgetLabel = AU.includes('APPROVED') || AU.includes('SPENT') ||
          AU.includes('COMMITTED') || AU.includes('PROJECTED') || AU.includes('FINAL');
        if (knownBudgetLabel) {
          pendingLabel = a;
        } else if (pendingLabel) {
          applyBudgetValue(pendingLabel, a);
          pendingLabel = '';
        }
      }
      continue;
    }

    // ── MILESTONES section ────────────────────────────────────────────────────
    // Each milestone is one row: Name | Start Date | End Date | Status | Slip Days | Predecessor
    if (section === 'milestones') {
      if (!a || a.length < 2) continue;
      const status = (row[3]||'upcoming').toLowerCase();
      const validStatuses = ['done','in-progress','at-risk','upcoming'];
      p.milestones.push({
        id: newMid(),
        name: a,
        startDate: cleanStr(row[1]),
        due: cleanStr(row[2]),
        status: validStatuses.includes(status) ? status : 'upcoming',
        slipDays: parseInt((row[4]||'0').replace(/\D/g,''))||0,
        dependsOn: null,
        _depName: cleanStr(row[5])
      });
      continue;
    }

    // ── ISSUES section ────────────────────────────────────────────────────────
    // Each issue is one row: Description | Owner | Priority | Linked Milestone | Date | Resolution
    if (section === 'issues') {
      if (!a || a.length < 2) continue;
      const pri = (row[2]||'medium').toLowerCase();
      p.issues.push({
        text: a,
        owner: cleanStr(row[1]),
        priority: ['high','medium','low'].includes(pri) ? pri : 'medium',
        linkedMilestone: null,
        _linkedName: cleanStr(row[3])
      });
      continue;
    }
  }

  // Resolve named milestone dependencies within this project
  p.milestones.forEach(m => {
    if (m._depName) {
      const dep = p.milestones.find(x => x.name.toLowerCase() === m._depName.toLowerCase());
      if (dep) m.dependsOn = dep.id;
    }
  });
  p.issues.forEach(iss => {
    if (iss._linkedName) {
      const ms = p.milestones.find(x => x.name.toLowerCase() === iss._linkedName.toLowerCase());
      if (ms) iss.linkedMilestone = ms.id;
    }
  });

  return p;
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n || isNaN(n)) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}
function pct(a,b) { return b ? Math.min(100, Math.round((a/b)*100)) : 0; }
function barColor(p) { return p>90?'#f87171':p>75?'#fbbf24':'#34d399'; }
function pillClass(s) { return {done:'pill-done','in-progress':'pill-in-progress','at-risk':'pill-at-risk',upcoming:'pill-upcoming',cascade:'pill-cascade'}[s]||'pill-upcoming'; }
function pillLabel(s) { return {done:'Complete','in-progress':'In Progress','at-risk':'At Risk',upcoming:'Upcoming',cascade:'⚠ Cascading'}[s]||s; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseDate(s) { if(!s) return null; const d=new Date(s+'T12:00:00'); return isNaN(d)?null:d; }
function fmtDate(d) { if(!d) return ''; return d.toISOString().slice(0,10); }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a,b) { return Math.round((b-a)/(1000*60*60*24)); }

// ─── DEPENDENCY / CASCADE ENGINE ─────────────────────────────────────────────
// Returns a map: milestoneId -> { cascadeDays, originalDue, effectiveDue, cascadeSource }
function computeCascades() {
  // Gather all milestones globally
  const allMs = {};
  projects.forEach(p => p.milestones.forEach(m => { allMs[m.id] = { ...m, projectId: p.id, projectName: p.name }; }));

  const cascadeMap = {}; // id -> { cascadeDays, effectiveDue, sourceId, sourceName }

  // BFS: propagate delays forward through dependency chain
  // First pass: find all "slipping" milestones (at-risk or behind their due date)
  const today = new Date(); today.setHours(12,0,0,0);

  function getSlipDays(m) {
    const due = parseDate(m.due);
    if (!due) return 0;
    if (m.status === 'done') return 0;
    if (m.status === 'at-risk') {
      // Estimate slip as duration + buffer (14 days default if no explicit slip)
      return m.slipDays || 14;
    }
    if (m.status === 'in-progress' && due < today) {
      return diffDays(due, today) + (m.slipDays || 7);
    }
    return 0;
  }

  // Topological sort + cascade propagation
  const visited = new Set();
  function propagate(msId, inheritedSlip, sourceId, sourceName) {
    const m = allMs[msId];
    if (!m) return;
    const existing = cascadeMap[msId] || { cascadeDays: 0 };
    const totalSlip = Math.max(existing.cascadeDays, inheritedSlip + getSlipDays(m));
    if (totalSlip <= 0) return;
    cascadeMap[msId] = { cascadeDays: totalSlip, sourceId, sourceName, effectiveDue: m.due ? fmtDate(addDays(parseDate(m.due), totalSlip)) : null };

    // Propagate to dependents
    projects.forEach(p => p.milestones.forEach(dep => {
      if (dep.dependsOn === msId && dep.status !== 'done') {
        propagate(dep.id, totalSlip, sourceId || msId, sourceName || (m.name + ' [' + m.projectName + ']'));
      }
    }));
  }

  // Seed: milestones that are slipping
  projects.forEach(p => p.milestones.forEach(m => {
    const slip = getSlipDays(m);
    if (slip > 0) {
      cascadeMap[m.id] = { cascadeDays: slip, sourceId: null, sourceName: null, effectiveDue: m.due ? fmtDate(addDays(parseDate(m.due), slip)) : null };
      // Propagate to dependents
      projects.forEach(pp => pp.milestones.forEach(dep => {
        if (dep.dependsOn === m.id && dep.status !== 'done') {
          propagate(dep.id, slip, m.id, m.name + ' [' + p.name + ']');
        }
      }));
    }
  }));

  return cascadeMap;
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
function renderSummary() {
  const tb = projects.reduce((s,p)=>s+p.budget,0);
  const ts = projects.reduce((s,p)=>s+p.spent,0);
  const tc = projects.reduce((s,p)=>s+(p.committed||0),0);
  const tu = projects.filter(p=>p.hasUnits).reduce((s,p)=>s+(p.unitsClosed||0),0);
  const ai = projects.flatMap(p=>p.issues);
  const hi = ai.filter(i=>i.priority==='high').length;
  const cascades = computeCascades();
  const cascadeCount = Object.keys(cascades).filter(id => cascades[id].cascadeDays > 0 && cascades[id].sourceId !== null).length;
  const pp = pct(ts,tb);
  const stats = [
    {val:projects.length,lbl:'Active Projects',sub:'in portfolio',color:'#f0f4f8'},
    {val:fmt(tb),lbl:'Total Portfolio',sub:tb?pp+'% deployed':'no budget set',color:'#f0f4f8'},
    {val:fmt(ts),lbl:'Capital Spent',sub:tc>0?fmt(tc)+' committed':'nothing committed',color:barColor(pp)},
    {val:tu,lbl:'Units Closed',sub:'YTD homebuilding',color:'#5b9cf6'},
    {val:cascadeCount > 0 ? cascadeCount+' cascading' : hi+' high issues',lbl:cascadeCount>0?'Schedule Risk':'Active Issues',sub:ai.length+' issues · '+Object.keys(cascades).filter(id=>cascades[id].cascadeDays>0).length+' at-risk milestones',color:cascadeCount>0?'#f87171':hi>0?'#fb923c':'#34d399'},
  ];
  document.getElementById('summaryStrip').innerHTML = stats.map(s=>`
    <div class="stat-card"><div class="val" style="color:${s.color}">${s.val}</div><div class="lbl">${s.lbl}</div><div class="sub">${s.sub}</div></div>`).join('');
}

function renderProjectCard(p) {
  const cascades = computeCascades();
  const pp=pct(p.spent,p.budget); const bc=barColor(pp);
  const committed = p.committed||0;
  const spentPct = pct(p.spent, p.budget);
  const committedPct = Math.min(pct(committed, p.budget), 100 - spentPct);
  const remaining = Math.max(0, p.budget - p.spent - committed);
  const spentColor = barColor(spentPct);

  const miHtml = p.milestones.length===0 ? '<div class="empty-state">No milestones yet</div>'
    : p.milestones.map(m => {
        const c = cascades[m.id];
        const hasCascade = c && c.cascadeDays > 0;
        const isSource = hasCascade && !c.sourceId;
        let depLabel = '';
        if (m.dependsOn) {
          const depM = allMilestones().find(x=>x.id===m.dependsOn);
          if (depM) {
            const depP = projects.find(pp=>pp.milestones.some(x=>x.id===m.dependsOn));
            depLabel = `<div class="milestone-dep-info ${hasCascade?'cascading':''}">⤷ depends on: ${esc(depM.name)}${depP&&depP.id!==p.id?' ['+esc(depP.name)+']':''}</div>`;
          }
        }
        const statusToShow = hasCascade && m.status!=='done' ? (isSource ? m.status : 'cascade') : m.status;
        const endDateDisplay = hasCascade && c.effectiveDue ? c.effectiveDue : (m.due||'');
        const endShifted = hasCascade && m.status!=='done';
        const startDisplay = m.startDate || '';
        return `<div class="milestone-row">
          <div class="milestone-left">
            <div class="milestone-name ${m.status==='done'?'done':''}">${esc(m.name)}</div>
            <div class="milestone-dates">
              ${startDisplay ? `<span>${startDisplay}</span><span class="arrow">→</span>` : ''}
              <span class="end-date ${endShifted?'shifted':''}">${endDateDisplay||'No date'}</span>
              ${endShifted ? `<span class="cascade-badge">+${c.cascadeDays}d</span>` : ''}
            </div>
            ${depLabel}
          </div>
          <div class="milestone-right">
            <span class="pill ${pillClass(statusToShow)}">${pillLabel(statusToShow)}</span>
          </div>
        </div>`;
      }).join('');

  // Issues with linked milestone label
  const isHtml = p.issues.length===0 ? '<div class="empty-state">No open issues</div>'
    : p.issues.map(iss => {
        let msLink = '';
        if (iss.linkedMilestone) {
          const lm = allMilestones().find(x=>x.id===iss.linkedMilestone);
          if (lm) msLink = `<span class="issue-linked-ms">⚑ ${esc(lm.name)}</span>`;
        }
        return `<div class="issue-item issue-${iss.priority}">
          <div style="display:flex;align-items:flex-start;gap:7px;">
            <div class="issue-dot issue-dot-${iss.priority}" style="margin-top:5px;"></div>
            <div style="flex:1">
              <div class="issue-text">${esc(iss.text)}</div>
              <div class="issue-meta">
                <span>Owner: ${esc(iss.owner||'Unassigned')}</span>
                ${msLink}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

  return `<div class="project-panel">
    <div class="panel-header">
      <div style="flex:1;min-width:0;">
        <div class="panel-title">${esc(p.name)}</div>
        <div class="panel-type">${esc(p.type||'—')}</div>
      </div>
      <div class="panel-header-right">
        ${p.hasUnits?`<div class="units-badge"><div class="num">${p.unitsClosed||0}</div><div class="lbl">Units Closed</div></div>`:''}
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${p.id}','settings')">⚙ Settings</button>
      </div>
    </div>
    <div class="card">

// ─── GANTT VIEW ───────────────────────────────────────────────────────────────
function renderGantt() {
  const shown = activeProject ? projects.filter(p=>p.id===activeProject) : projects;
  const el = document.getElementById('mainContent');

  if (shown.length===0) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No projects to display</div>'; return; }

  // Gather all milestones with project info
  const cascades = computeCascades();
  const allMs = [];
  shown.forEach(p => p.milestones.forEach(m => allMs.push({...m, projectId:p.id, projectName:p.name})));

  if (allMs.length===0) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No milestones added yet. Switch to Cards view to add milestones.</div>'; return; }

  // Determine date range
  const today = new Date(); today.setHours(12,0,0,0);
  const dates = allMs.flatMap(m=>[parseDate(m.startDate), parseDate(m.due)]).filter(Boolean);
  const cascadeDates = Object.values(cascades).map(c=>parseDate(c.effectiveDue)).filter(Boolean);
  const allDates = [...dates, ...cascadeDates, today];
  let minDate = new Date(Math.min(...allDates));
  let maxDate = new Date(Math.max(...allDates));
  // Pad by 2 weeks each side
  minDate = addDays(minDate, -14);
  maxDate = addDays(maxDate, 30);
  const totalDays = diffDays(minDate, maxDate) || 90;

  // Build month columns for header
  const months = [];
  let cur = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  while (cur <= maxDate) {
    const start = Math.max(0, diffDays(minDate, cur));
    const endOfMonth = new Date(cur.getFullYear(), cur.getMonth()+1, 0);
    const end = Math.min(totalDays, diffDays(minDate, endOfMonth));
    months.push({ label: cur.toLocaleDateString('en-US',{month:'short',year:'2-digit'}), startPct: (start/totalDays)*100, widthPct: ((end-start)/totalDays)*100 });
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const todayPct = (diffDays(minDate, today) / totalDays) * 100;

  // Group by project
  const projectGroups = shown.map(p => ({
    project: p,
    milestones: allMs.filter(m=>m.projectId===p.id)
  })).filter(g=>g.milestones.length>0);

  const ganttHtml = projectGroups.map(g => {
    const rowsHtml = g.milestones.map(m => {
      const c = cascades[m.id];
      const hasCascade = c && c.cascadeDays > 0 && m.status !== 'done';
      const effectiveDue = hasCascade && c.effectiveDue ? parseDate(c.effectiveDue) : parseDate(m.due);
      const originalDue = parseDate(m.due);
      const startDate = parseDate(m.startDate);

      // Bar: span from start date to end date (or just a point marker if no start date)
      let barLeft = 0, barWidth = 1.5;
      if (originalDue) {
        if (startDate && startDate < originalDue) {
          barLeft = Math.max(0, (diffDays(minDate, startDate)/totalDays)*100);
          barWidth = Math.max(1, (diffDays(startDate, originalDue)/totalDays)*100);
        } else {
          barLeft = Math.max(0, Math.min(98, (diffDays(minDate, originalDue)/totalDays)*100));
          barWidth = 1.5;
        }
      }
      let cascadeBarLeft = barLeft + barWidth, cascadeBarWidth = 0;
      if (hasCascade && effectiveDue && originalDue) {
        cascadeBarWidth = Math.max(0.5, (diffDays(originalDue, effectiveDue)/totalDays)*100);
      }

      const barClass = hasCascade ? 'gantt-bar-cascade' : {done:'gantt-bar-done','in-progress':'gantt-bar-progress','at-risk':'gantt-bar-risk',upcoming:'gantt-bar-upcoming'}[m.status]||'gantt-bar-upcoming';

      let depHtml = '';
      if (m.dependsOn) {
        const depM = allMilestones().find(x=>x.id===m.dependsOn);
        if (depM) depHtml = `<span class="dep-label ${hasCascade?'broken':''}" title="Depends on: ${esc(depM.name)}">⤷</span>`;
      }

      const cascadeDayLabel = hasCascade ? `<span style="color:var(--red);font-weight:800">+${c.cascadeDays}d</span>` : '';
      // Date range display
      const startStr = m.startDate || '';
      const endStr = hasCascade && c.effectiveDue ? c.effectiveDue : (m.due||'');
      const dateRangeHtml = startStr
        ? `<span style="font-size:9px">${startStr}</span><span style="color:var(--muted2);margin:0 3px">→</span><span class="${hasCascade?'shifted':''}" style="${hasCascade?'color:var(--orange)':''}">${endStr}</span>`
        : `<span class="${hasCascade?'shifted':''}" style="${hasCascade?'color:var(--orange)':''}">${endStr||'—'}</span>`;

      return `<tr>
        <td><div class="g-name ${m.status==='done'?'done':''}">${depHtml} ${esc(m.name)}</div></td>
        <td class="g-date ${hasCascade?'shifted':''}">${dateRangeHtml}</td>
        <td class="g-status"><span class="pill ${pillClass(hasCascade?'cascade':m.status)}">${pillLabel(hasCascade?'cascade':m.status)}</span></td>
        <td class="g-cascade">${cascadeDayLabel}</td>
        <td>
          <div class="gantt-cell">
            <div class="gantt-today" style="left:${todayPct}%"></div>
            <div class="gantt-bar ${barClass}" style="left:${barLeft}%;width:max(8px,${barWidth}%)"></div>
            ${hasCascade&&cascadeBarWidth>0?`<div class="gantt-bar" style="left:${cascadeBarLeft}%;width:${cascadeBarWidth}%;background:rgba(248,113,113,0.2);border:1px dashed rgba(248,113,113,0.5);"></div>`:''}
          </div>
        </td>
      </tr>`;
    }).join('');

    const monthHeaders = months.map(m=>`<th class="month-header" style="width:${m.widthPct}%">${m.label}</th>`).join('');

    return `<div class="gantt-wrapper">
      <div class="gantt-header-bar">
        <div>
          <div class="gantt-title">${esc(g.project.name)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em">${esc(g.project.type||'')}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${g.project.id}','milestones')">Edit Milestones</button>
      </div>
      <div class="gantt-scroll">
        <table class="gantt-table">
          <thead>
            <tr>
              <th style="width:220px">Milestone</th>
              <th style="width:130px;text-align:center">Due Date</th>
              <th style="width:110px;text-align:center">Status</th>
              <th style="width:80px;text-align:center">Slip</th>
              <th>
                <div style="display:grid;grid-template-columns:${months.map(m=>m.widthPct+'%').join(' ')};width:100%">
                  ${months.map(m=>`<div style="text-align:center;font-size:9px;font-weight:800;letter-spacing:0.08em;color:var(--muted)">${m.label}</div>`).join('')}
                </div>
              </th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  // Legend
  const legend = `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:10px;color:var(--muted);align-items:center;">
    <span style="font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase">Legend:</span>
    <span><span style="display:inline-block;width:12px;height:6px;background:rgba(52,211,153,0.4);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Complete</span>
    <span><span style="display:inline-block;width:12px;height:6px;background:rgba(91,156,246,0.4);border-radius:2px;margin-right:4px;vertical-align:middle"></span>In Progress</span>
    <span><span style="display:inline-block;width:12px;height:6px;background:rgba(251,146,60,0.4);border-radius:2px;margin-right:4px;vertical-align:middle"></span>At Risk</span>
    <span><span style="display:inline-block;width:12px;height:6px;background:rgba(248,113,113,0.35);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Cascading Delay</span>
    <span><span style="display:inline-block;width:1px;height:12px;background:rgba(251,191,36,0.5);margin-right:4px;vertical-align:middle"></span>Today</span>
    <span style="color:var(--muted2)">⤷ = has predecessor dependency</span>
  </div>`;

  el.innerHTML = legend + ganttHtml;
}

// ─── ALL MILESTONES HELPER ────────────────────────────────────────────────────
function allMilestones() {
  return projects.flatMap(p => p.milestones.map(m=>({...m,projectId:p.id,projectName:p.name})));
}

// ─── IMPORT ───────────────────────────────────────────────────────────────────
function toggleImport() {
  const p=document.getElementById('importPanel');
  p.style.display=p.style.display==='none'?'block':'none';
  document.getElementById('importError').textContent='';
}
function applyImport() {
  const rows=document.getElementById('importText').value.trim().split('\n').slice(1);
  let matched=0;
  rows.forEach(row=>{
    const cols=row.split('\t'); if(cols.length<3) return;
    const p=projects.find(x=>x.name.toLowerCase().includes(cols[0].trim().toLowerCase()));
    if(p){
      const b=parseFloat(cols[1].replace(/[$,\s]/g,'')); const s=parseFloat(cols[2].replace(/[$,\s]/g,''));
      if(!isNaN(b))p.budget=b; if(!isNaN(s))p.spent=s; matched++;
    }
  });
  if(!matched){document.getElementById('importError').textContent='No matching project names found.';return;}
  toggleImport(); document.getElementById('importText').value=''; render();
}

// ─── SAVE HANDLERS ────────────────────────────────────────────────────────────
function saveSettings(id){
  const p=projects.find(x=>x.id===id);
  p.name=document.getElementById('st_name').value.trim()||p.name;
  p.type=document.getElementById('st_type').value;
  p.hasUnits=document.getElementById('st_hu').checked;
  if(p.hasUnits){p.unitsPlanned=parseInt(document.getElementById('st_pl').value)||0;p.unitsClosed=parseInt(document.getElementById('st_cl').value)||0;p.unitsInProgress=parseInt(document.getElementById('st_ip').value)||0;}
  closeModal();render();
}
function deleteProject(id){
  if(!confirm('Delete this project? Cannot be undone.'))return;
  projects=projects.filter(x=>x.id!==id);
  if(activeProject===id)activeProject=null;
  closeModal();render();
}
function saveBudget(id){
  const p=projects.find(x=>x.id===id);
  p.budget=parseFloat(document.getElementById('ed_b').value)||0;
  p.spent=parseFloat(document.getElementById('ed_s').value)||0;
  p.committed=parseFloat(document.getElementById('ed_c').value)||0;
  closeModal();render();
}

function addMR(projectId){
  const i='n'+(_mc++); const d=document.createElement('div');
  d.className='edit-row'; d.id='mrow_'+i; d.style.cssText='flex-wrap:wrap;gap:5px;margin-bottom:7px;';
  const allMs=allMilestones();
  const depOpts=`<option value="">No dependency</option>`+allMs.map(m=>{const pp=projects.find(x=>x.milestones.some(x2=>x2.id===m.id));const proj=pp&&pp.id!==projectId?` [${pp.name}]`:'';return`<option value="${m.id}">${esc(m.name)}${proj}</option>`;}).join('');
  d.innerHTML=`<input type="text" id="mn_${i}" placeholder="Milestone name" style="min-width:140px;flex:2"/>
    <input type="text" class="w-date" id="mstart_${i}" placeholder="Start YYYY-MM-DD" title="Start date"/>
    <input type="text" class="w-date" id="md_${i}" placeholder="End YYYY-MM-DD" title="End date"/>
    <select class="w-status" id="ms_${i}">${['done','in-progress','at-risk','upcoming'].map(s=>`<option value="${s}">${pillLabel(s)}</option>`).join('')}</select>
    <input type="number" class="w-dur" id="mslip_${i}" placeholder="slip d" title="Slip days"/>
    <select class="w-dep" id="mdep_${i}">${depOpts}</select>
    <button class="btn btn-danger" onclick="this.closest('.edit-row').remove()">✕</button>`;
  document.getElementById('milestoneRows').appendChild(d);
}

function addIR(projectId){
  const i='n'+(_ic++); const d=document.createElement('div');
  d.className='edit-row'; d.id='irow_'+i; d.style.cssText='flex-wrap:wrap;gap:5px;margin-bottom:7px;';
  const msOpts=`<option value="">No milestone linked</option>`+projects.flatMap(pp=>pp.milestones.map(m=>{const proj=pp.id!==projectId?` [${pp.name}]`:'';return`<option value="${m.id}">${esc(m.name)}${proj}</option>`;})).join('');
  d.innerHTML=`<input type="text" id="it_${i}" placeholder="Issue description" style="flex:3;min-width:160px"/>
    <input type="text" class="w-date" id="io_${i}" placeholder="Owner" style="width:90px;flex:none"/>
    <select class="w-pri" id="ip_${i}"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
    <select class="w-ms" id="ilm_${i}">${msOpts}</select>
    <button class="btn btn-danger" onclick="this.closest('.edit-row').remove()">✕</button>`;
  document.getElementById('issueRows').appendChild(d);
}

function saveMilestones(id){
  const p=projects.find(x=>x.id===id);
  const rows=document.querySelectorAll('[id^="mrow_"]');
  const existing=p.milestones;
  p.milestones=Array.from(rows).map((r,idx)=>{
    const ri=r.id.replace('mrow_','');
    const name=document.getElementById('mn_'+ri)?.value||'';
    if(!name) return null;
    const existingM = existing[idx];
    return{
      id: existingM?.id || newMid(),
      name,
      startDate:document.getElementById('mstart_'+ri)?.value||'',
      due:document.getElementById('md_'+ri)?.value||'',
      status:document.getElementById('ms_'+ri)?.value||'upcoming',
      slipDays:parseInt(document.getElementById('mslip_'+ri)?.value)||0,
      dependsOn:document.getElementById('mdep_'+ri)?.value||null
    };
  }).filter(Boolean);
  closeModal();render();
}

function saveIssues(id){
  const p=projects.find(x=>x.id===id);
  p.issues=Array.from(document.querySelectorAll('[id^="irow_"]')).map(r=>{
    const i=r.id.replace('irow_','');
    return{text:document.getElementById('it_'+i)?.value||'',owner:document.getElementById('io_'+i)?.value||'',priority:document.getElementById('ip_'+i)?.value||'medium',linkedMilestone:document.getElementById('ilm_'+i)?.value||null};
  }).filter(iss=>iss.text);
  closeModal();render();
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function render(){renderSummary();renderTabs();renderMain();}
render();
startAutoRefresh();
</script>
</body>
